openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: articles
    description: Article operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /articles:
    get:
      operationId: getArticles
      tags: [articles]
      summary: Get articles
      description: Returns list of news articles
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArticlesResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    Article:
      type: object
      properties:
        id:
          type: string
        headline:
          type: string
        publisher:
          type: string
        publisherInitial:
          type: string
        publishedAt:
          type: string
        readingTime:
          type: integer
        category:
          type: string
        summary:
          type: string
        url:
          type: string
        credibilityScore:
          type: integer
        imageColor:
          type: string
        isBreaking:
          type: boolean
      required:
        - id
        - headline
        - publisher
        - publisherInitial
        - publishedAt
        - readingTime
        - category
        - summary
        - url
        - credibilityScore
        - imageColor
    ArticlesResponse:
      type: array
      items:
        $ref: "#/components/schemas/Article"

