kind = "mobile"
previewPath = "/"
title = "NewsLens"
version = "1.0.0"
id = "artifacts/newslens"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 24489

[services.development]
run = "pnpm --filter @workspace/newslens run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/newslens", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/newslens", "run", "serve" ]

[services.env]
PORT = "24489"
BASE_PATH = "/"
